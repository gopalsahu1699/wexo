name: wexo_mobile
description: Workforce and Service Management App for WEXO.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  supabase_flutter: ^2.0.2
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  framer_motion: ^0.0.1+1 # Note: usually animations are done via flutter's own tools, but for consistency with web naming
  animations: ^2.0.11
  intl: ^0.19.0
  geolocator: ^10.1.0
  camera: ^0.10.5+5
  path_provider: ^2.1.2
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
